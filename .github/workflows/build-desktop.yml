# Builds the Videobox desktop app installers on GitHub's runners:
#   - Windows: NSIS installer (.exe)
#   - macOS:   .dmg + .zip (Apple Silicon; unsigned — first launch needs
#              right-click → Open, or Privacy & Security → Open Anyway)
#
# Trigger manually from the Actions tab (workflow_dispatch), or push a
# version tag like v1.0.1. Installers appear as downloadable artifacts on
# the run page.
#
# CSC_IDENTITY_AUTO_DISCOVERY=false stops electron-builder from looking
# for code-signing certificates — builds are unsigned until we add certs.
name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # --publish never: in CI electron-builder defaults to publishing a
      # GitHub release (and demands GH_TOKEN); we only want the artifacts.
      - run: npm run electron:build -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v5
        with:
          name: videobox-windows
          path: |
            dist-packages/*.exe
            dist-packages/*.exe.blockmap

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # --publish never: in CI electron-builder defaults to publishing a
      # GitHub release (and demands GH_TOKEN); we only want the artifacts.
      - run: npm run electron:build -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v5
        with:
          name: videobox-macos
          path: |
            dist-packages/*.dmg
            dist-packages/*.zip
      # The build is unsigned (no Apple Developer cert yet), so macOS
      # quarantines the downloaded app and shows a misleading "Videobox is
      # damaged" dialog. Put the workaround on the run page, right where
      # people download the artifact.
      - name: macOS install instructions
        run: |
          {
            echo "## macOS install note"
            echo ""
            echo "The app is **unsigned**, so after downloading macOS will claim it is *damaged*. It isn't — that's the quarantine flag on unsigned apps."
            echo ""
            echo "1. Open the dmg and drag **Videobox** to Applications"
            echo "2. In Terminal run:"
            echo ""
            echo '   ```'
            echo "   xattr -cr /Applications/Videobox.app"
            echo '   ```'
            echo ""
            echo "3. Launch normally. One time per machine."
          } >> "$GITHUB_STEP_SUMMARY"
