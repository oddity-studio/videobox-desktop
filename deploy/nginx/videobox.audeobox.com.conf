server {
    listen 80;
    server_name videobox.audeobox.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;

    server_name videobox.audeobox.com;

    ssl_certificate /etc/letsencrypt/live/videobox.audeobox.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/videobox.audeobox.com/privkey.pem;

    access_log /var/log/nginx/videobox-access.log;
    error_log /var/log/nginx/videobox-error.log;

    client_max_body_size 64m;

    auth_basic "Videobox Staff";
    auth_basic_user_file /etc/nginx/videobox.htpasswd;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location = /api/render {
        proxy_pass http://127.0.0.1:3101/render;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location ^~ /api/render/ {
        rewrite ^/api/render/(.*)$ /render/$1 break;
        proxy_pass http://127.0.0.1:3101;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location ^~ /audeobox-feeds/ {
        rewrite ^/audeobox-feeds/(.*)$ /api/feeds/$1 break;
        proxy_pass https://www.audeobox.com;
        proxy_ssl_server_name on;
        proxy_set_header Host www.audeobox.com;
        proxy_set_header Authorization "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
