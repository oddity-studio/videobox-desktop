name: videobox

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  web:
    container_name: videobox_web
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
      args:
        NEXT_PUBLIC_ASSET_BASE_URL: ${NEXT_PUBLIC_ASSET_BASE_URL:-https://storage.googleapis.com/audeobox-cdn/videobox}
        NEXT_PUBLIC_RENDER_API_BASE: ${NEXT_PUBLIC_RENDER_API_BASE:-/api/render}
        NEXT_PUBLIC_FEED_BASE_URL: ${NEXT_PUBLIC_FEED_BASE_URL:-/audeobox-feeds}
    ports:
      - "${VIDEOBOX_BIND_HOST:-127.0.0.1}:${VIDEOBOX_WEB_PORT:-3100}:3000"
    depends_on:
      render:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  render:
    container_name: videobox_render
    build:
      context: ..
      dockerfile: deploy/render.Dockerfile
    # init=true makes Docker run tini as PID 1 so SIGCHLD from exited
    # Chromium subprocesses gets reaped. Without this, node-as-PID-1 leaves
    # <defunct> Chrome processes accumulating; eventually they exhaust the
    # container's PID table and new Chromium launches hang silently.
    init: true
    # Cap blast radius. A leaking Chromium can run away on memory; without
    # this the container sees the full host RAM via cgroup (~8 EB warning
    # in the Remotion logs) and an OOM could take other services with it.
    mem_limit: 6g
    # Renders may consume all idle cores, but should yield to latency-sensitive
    # services when this compose stack shares a host with them.
    cpu_shares: 256
    # One render currently uses roughly 111 PIDs; bound Chromium leaks while
    # leaving more than 2x normal headroom at RENDER_CONCURRENCY=1.
    pids_limit: 256
    environment:
      NODE_ENV: production
      PORT: 3001
      PROJECT_DIR: /project
      OUTPUT_DIR: /renders
      # The render browser is the pinned chrome-headless-shell baked into
      # the image (BROWSER_EXECUTABLE in render.Dockerfile) — newer builds
      # SIGILL on the prod CPU. Frame-synced media doesn't need browser
      # video decode (OffthreadVideo/AnimatedImage), so headless-shell is
      # sufficient everywhere.
      NEXT_PUBLIC_ASSET_BASE_URL: ${NEXT_PUBLIC_ASSET_BASE_URL:-https://storage.googleapis.com/audeobox-cdn/videobox}
      NEXT_PUBLIC_RENDER_API_BASE: ${NEXT_PUBLIC_RENDER_API_BASE:-/api/render}
      NEXT_PUBLIC_FEED_BASE_URL: ${NEXT_PUBLIC_FEED_BASE_URL:-/audeobox-feeds}
      RENDER_CONCURRENCY: ${RENDER_CONCURRENCY:-1}
      # Frame-synced media (overlay video, loopVideo, fire webp) — same
      # behavior as the desktop app, so one videoProps tweak covers both.
      FRAME_SYNC_MEDIA: ${FRAME_SYNC_MEDIA:-1}
      RENDER_CLIENT_LEASE_MS: ${RENDER_CLIENT_LEASE_MS:-180000}
      RENDER_STALL_MS: ${RENDER_STALL_MS:-300000}
      MAX_PENDING_RENDER_JOBS: ${MAX_PENDING_RENDER_JOBS:-3}
    ports:
      - "${VIDEOBOX_BIND_HOST:-127.0.0.1}:${VIDEOBOX_RENDER_PORT:-3101}:3001"
    volumes:
      - renders:/renders
    shm_size: "1gb"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  renders:
