server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/videobox-web-access.log;
    error_log /var/log/nginx/videobox-web-error.log;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml application/wasm;

    client_max_body_size 100m;

    location = /api/render {
        proxy_pass http://render:3001/render;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location ^~ /api/render/ {
        rewrite ^/api/render/(.*)$ /render/$1 break;
        proxy_pass http://render:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location ^~ /audeobox-feeds/ {
        rewrite ^/audeobox-feeds/(.*)$ /api/feeds/$1 break;
        proxy_pass https://www.audeobox.com;
        proxy_ssl_server_name on;
        proxy_set_header Host www.audeobox.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|wasm|png|jpg|jpeg|gif|webp|svg|ico)$ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }
}
